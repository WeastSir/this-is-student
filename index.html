<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This Is Student — Lernplattform</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style-original.css" id="themeStylesheet">
<script>try{var t=localStorage.getItem('tis_theme');if(t==='v2')document.getElementById('themeStylesheet').href='style-v2.css';}catch(e){}</script>
</head>
<body>

<nav>
<div class="nav-top" style="display:grid;grid-template-columns:1fr auto 1fr">
<div style="display:flex;align-items:center;gap:8px">
<div class="nb" onclick="go('home')">This Is Student</div>
<button class="nl nl-main on" data-s="home" onclick="go('home')">Home</button>
<button class="nl nl-main" data-s="kurse" onclick="go('kurse')">Kurse</button>
</div>
<div id="navCourseCenter" style="display:flex;align-items:center;gap:8px;justify-self:center">
<button class="nl nl-main" data-s="recht2" onclick="go('recht2')" style="display:none">Recht 2</button>
<button class="nl nl-main" data-s="arb" onclick="go('arb')" style="display:none">Arbeitsrecht</button>
<button class="nl nl-main" data-s="ctrl" onclick="go('ctrl')" style="display:none">Controlling 2</button>
</div>
<div style="display:flex;align-items:center;gap:6px;justify-self:end">
<button onclick="toggleTheme()" id="themeBtn" style="padding:5px 12px;font-size:11px;border-radius:980px;white-space:nowrap;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);cursor:pointer;font-weight:500;letter-spacing:-.1px;transition:all .3s" title="Dark/Light Mode">☀️</button>
<div id="accountMenu" style="position:relative">
<button onclick="document.getElementById('accountDrop').classList.toggle('show')" id="accountBtn" style="padding:4px 10px;font-size:11px;border-radius:980px;white-space:nowrap;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);cursor:pointer;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .3s">
<span id="accountAvatar" style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#c44569);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700">?</span>
<span id="accountName" style="max-width:80px;overflow:hidden;text-overflow:ellipsis">Account</span>
<span style="font-size:8px;opacity:.5">▼</span>
</button>
<div id="accountDrop" style="display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:8px 0;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,.2);z-index:500;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)">
<div id="accountInfo" style="padding:12px 16px;border-bottom:1px solid var(--bd)">
<div id="dropName" style="font-size:13px;font-weight:600;color:var(--tx)">Benutzer</div>
<div id="dropEmail" style="font-size:11px;color:var(--tx3);margin-top:1px;overflow:hidden;text-overflow:ellipsis"></div>
<div id="dropRole" style="font-size:11px;color:var(--tx3);margin-top:2px">Rolle</div>
</div>
<button onclick="showChangePWModal()" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;border:none;background:none;color:var(--tx2);font-family:var(--f);font-size:12.5px;cursor:pointer;text-align:left;transition:background .2s" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">
<span style="font-size:14px">🔑</span> Passwort ändern
</button>
<button onclick="go('impressum');document.getElementById('accountDrop').classList.remove('show')" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;border:none;background:none;color:var(--tx2);font-family:var(--f);font-size:12.5px;cursor:pointer;text-align:left;transition:background .2s" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">
<span style="font-size:14px">ℹ️</span> Impressum
</button>
<button onclick="go('faq');document.getElementById('accountDrop').classList.remove('show')" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;border:none;background:none;color:var(--tx2);font-family:var(--f);font-size:12.5px;cursor:pointer;text-align:left;transition:background .2s" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">
<span style="font-size:14px">❓</span> FAQ
</button>
<button id="adminPanelBtn" onclick="go('admin');document.getElementById('accountDrop').classList.remove('show')" style="display:none;align-items:center;gap:8px;width:100%;padding:10px 16px;border:none;background:none;color:var(--ac);font-family:var(--f);font-size:12.5px;cursor:pointer;text-align:left;font-weight:600;transition:background .2s" onmouseover="this.style.background='var(--al)'" onmouseout="this.style.background='none'">
<span style="font-size:14px">⚙</span> Admin Panel
</button>
<div style="border-top:1px solid var(--bd);margin:4px 0"></div>
<button onclick="logout()" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;border:none;background:none;color:var(--r);font-family:var(--f);font-size:12.5px;cursor:pointer;text-align:left;font-weight:600;transition:background .2s" onmouseover="this.style.background='var(--rl)'" onmouseout="this.style.background='none'">
<span style="font-size:14px">↪</span> Abmelden
</button>
</div>
</div>
</div>
</div>
<div class="nav-sub" id="navSub"></div>
<div class="nav-topics" id="navTopics"></div>
</nav>
<div class="ct">


<!-- ADMIN PANEL -->
<div class="sec" id="admin">
<h1>Admin Panel</h1>
<p class="sub">Benutzerverwaltung, Invite-Codes & Einstellungen</p>
<div id="adminContent"><div style="text-align:center;padding:20px;color:var(--tx3)">Laden...</div></div>
</div>

<!-- COURSE CONTENT (loaded by modules) -->
<div id="courseContent"></div>


<!-- IMPRESSUM & FAQ (loaded by modules) -->
<div id="pagesContent"></div>

</div>


</div>

</div>

<div id="artModal" onclick="if(event.target===this)closeArt()"><div id="artBox">
<button id="artClose" onclick="closeArt()">&times;</button>
<div id="artTitle"></div>
<div id="artRef"></div>
<div id="artText"></div>
<div id="artExplain"></div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="engine/login.js"></script>
<script src="engine/users.js"></script>
<script src="engine/core.js"></script>
<script src="pages/home.js"></script>


<!-- COURSE MODULES -->
<script src="engine/abkz.js"></script>
<script src="kurse/kurs-recht2.js"></script>
<script src="kurse/kurs-arbeitsrecht.js"></script>
<script src="kurse/kurs-controlling2.js"></script>
<script src="kurse/kurs-finac3.js"></script>
<script src="kurse/kurs-marketing.js"></script>
<script src="kurse/kurs-rm.js"></script>
<script src="kurse/kurs-hrm2.js"></script>
<script src="kurse/kurs-sales.js"></script>
<script src="pages/impressum.js"></script>
<script src="pages/faq.js"></script>
<script src="pages/support.js"></script>
<script src="pages/downloads.js"></script>
<script src="engine/lernkarten-sync.js"></script>
<script src="engine/theme-switcher.js"></script>

</body>
</html>
